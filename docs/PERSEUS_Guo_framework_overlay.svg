<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" font-family="Helvetica, Arial, sans-serif">
  <rect width="1280" height="720" fill="#ffffff"/>
  <text x="40" y="44" font-size="26" font-weight="700" fill="#16241d">PERSEUS in the integrative-AI forest-health framework</text>
  <text x="40" y="70" font-size="14" fill="#5a6b62">Where the decision-support tool sits today, and the path to the full framework (after Guo, Q. et al. 2026)</text>

  <!-- legend -->
  <g font-size="13" fill="#33433b">
    <circle cx="800" cy="40" r="7" fill="#2e9e6b"/><text x="813" y="45">Built</text>
    <circle cx="880" cy="40" r="7" fill="#c9a227"/><text x="893" y="45">Partial</text>
    <circle cx="975" cy="40" r="7" fill="#d98a3c"/><text x="988" y="45">Gap / next</text>
  </g>

  <!-- DRIVERS -->
  <rect x="40" y="100" width="220" height="470" rx="12" fill="#f3f7f4" stroke="#cfded6"/>
  <text x="150" y="128" font-size="16" font-weight="700" fill="#16241d" text-anchor="middle">Forest health drivers</text>
  <g text-anchor="middle" font-size="14" fill="#1f2e27">
    <rect x="64" y="150" width="172" height="60" rx="9" fill="#e7f2eb" stroke="#bcd8c8"/><text x="150" y="186">Biotic disturbance</text>
    <rect x="64" y="226" width="172" height="60" rx="9" fill="#e7f2eb" stroke="#bcd8c8"/><text x="150" y="262">Abiotic disturbance</text>
    <rect x="64" y="302" width="172" height="60" rx="9" fill="#e7f2eb" stroke="#bcd8c8"/><text x="150" y="338">Human activities</text>
  </g>
  <circle cx="226" cy="178" r="7" fill="#2e9e6b"/><circle cx="226" cy="254" r="7" fill="#2e9e6b"/><circle cx="226" cy="330" r="7" fill="#2e9e6b"/>
  <text x="150" y="400" font-size="12" fill="#5a6b62" text-anchor="middle" font-style="italic">HRR stress + landowner</text>
  <text x="150" y="418" font-size="12" fill="#5a6b62" text-anchor="middle" font-style="italic">layers capture all three</text>
  <text x="150" y="452" font-size="12" fill="#a9711f" text-anchor="middle">Next: decompose into</text>
  <text x="150" y="470" font-size="12" fill="#a9711f" text-anchor="middle">named agents (budworm,</text>
  <text x="150" y="488" font-size="12" fill="#a9711f" text-anchor="middle">fire, drought, harvest)</text>

  <!-- arrow -->
  <path d="M262 330 L296 330" stroke="#6b7d73" stroke-width="2.5" marker-end="url(#a)"/>

  <!-- ENGINE -->
  <rect x="300" y="100" width="560" height="470" rx="12" fill="#fbfbf6" stroke="#d8d3bf"/>
  <text x="580" y="128" font-size="16" font-weight="700" fill="#16241d" text-anchor="middle">Training-data engine (integrative AI)</text>

  <!-- data/attributes -->
  <rect x="320" y="150" width="245" height="330" rx="10" fill="#f7faf6" stroke="#cfe0c9"/>
  <text x="442" y="174" font-size="14" font-weight="700" fill="#1f2e27" text-anchor="middle">Data / attributes</text>
  <circle cx="548" cy="168" r="7" fill="#2e9e6b"/>
  <g font-size="12.5" fill="#33433b" text-anchor="middle">
    <text x="442" y="206">growth / mortality · structure</text>
    <text x="442" y="228">composition · tree cover</text>
    <text x="442" y="250">biodiversity · invasion</text>
    <line x1="350" y1="266" x2="534" y2="266" stroke="#dce6da"/>
    <text x="442" y="290">productivity · resistance</text>
    <text x="442" y="312">resilience · sustainability</text>
  </g>
  <text x="442" y="350" font-size="12" fill="#5a6b62" text-anchor="middle" font-style="italic">PERSEUS already ingests</text>
  <text x="442" y="368" font-size="12" fill="#5a6b62" text-anchor="middle" font-style="italic">most of this via FVS,</text>
  <text x="442" y="386" font-size="12" fill="#5a6b62" text-anchor="middle" font-style="italic">yield curves, HRR</text>
  <text x="442" y="424" font-size="12" fill="#a9711f" text-anchor="middle">Next: imagery layer</text>
  <text x="442" y="442" font-size="12" fill="#a9711f" text-anchor="middle">(NAIP / LiDAR / satellite)</text>
  <text x="442" y="460" font-size="12" fill="#a9711f" text-anchor="middle">= the mapping team + SPADE</text>

  <!-- AI tools -->
  <rect x="585" y="150" width="255" height="330" rx="10" fill="#f7f6ef" stroke="#ddd6bf"/>
  <text x="712" y="174" font-size="14" font-weight="700" fill="#1f2e27" text-anchor="middle">AI tools</text>
  <g font-size="13" text-anchor="middle">
    <rect x="605" y="190" width="215" height="40" rx="8" fill="#e7f2eb" stroke="#bcd8c8"/><text x="700" y="215" fill="#1f2e27">Classical ML / mechanistic</text><circle cx="806" cy="210" r="7" fill="#2e9e6b"/>
    <rect x="605" y="240" width="215" height="40" rx="8" fill="#fbf0e2" stroke="#e5c79e"/><text x="700" y="265" fill="#1f2e27">Deep learning (imagery)</text><circle cx="806" cy="260" r="7" fill="#d98a3c"/>
    <rect x="605" y="290" width="215" height="40" rx="8" fill="#fbf0e2" stroke="#e5c79e"/><text x="700" y="315" fill="#1f2e27">Generative AI (reports, NL)</text><circle cx="806" cy="310" r="7" fill="#d98a3c"/>
    <rect x="605" y="340" width="215" height="40" rx="8" fill="#faf4e0" stroke="#e0d09a"/><text x="700" y="365" fill="#1f2e27">Agentic AI (run broker)</text><circle cx="806" cy="360" r="7" fill="#c9a227"/>
  </g>
  <text x="712" y="416" font-size="12" fill="#5a6b62" text-anchor="middle" font-style="italic">Widen the axis from</text>
  <text x="712" y="434" font-size="12" fill="#5a6b62" text-anchor="middle" font-style="italic">mechanistic ensembles</text>
  <text x="712" y="452" font-size="12" fill="#5a6b62" text-anchor="middle" font-style="italic">toward integrative AI</text>

  <text x="580" y="506" font-size="13" fill="#a9711f" text-anchor="middle">Verification / validation loop — partial (model agreement + FIA reconciliation); formalize as continuous</text>
  <circle cx="846" cy="502" r="7" fill="#c9a227"/>

  <!-- arrow -->
  <path d="M862 330 L896 330" stroke="#6b7d73" stroke-width="2.5" marker-end="url(#a)"/>

  <!-- MONITORING -->
  <rect x="900" y="100" width="340" height="470" rx="12" fill="#f3f7f4" stroke="#cfded6"/>
  <text x="1070" y="128" font-size="16" font-weight="700" fill="#16241d" text-anchor="middle">Forest-health monitoring</text>

  <rect x="922" y="150" width="296" height="150" rx="10" fill="#fbf0e2" stroke="#e5c79e"/>
  <text x="1070" y="176" font-size="14" font-weight="700" fill="#1f2e27" text-anchor="middle">Surveillance · near-term</text>
  <circle cx="1204" cy="170" r="7" fill="#d98a3c"/>
  <g font-size="12.5" fill="#33433b" text-anchor="middle">
    <text x="1070" y="206">real-time threat detection</text>
    <text x="1070" y="226">disturbance mapping</text>
  </g>
  <text x="1070" y="262" font-size="12" fill="#a9711f" text-anchor="middle" font-style="italic">Gap: add a near-real-time</text>
  <text x="1070" y="280" font-size="12" fill="#a9711f" text-anchor="middle" font-style="italic">disturbance feed</text>

  <rect x="922" y="318" width="296" height="220" rx="10" fill="#e7f2eb" stroke="#bcd8c8"/>
  <text x="1070" y="344" font-size="14" font-weight="700" fill="#1f2e27" text-anchor="middle">Assessment · longer-term</text>
  <circle cx="1204" cy="338" r="7" fill="#2e9e6b"/>
  <g font-size="12.5" fill="#33433b" text-anchor="middle">
    <text x="1070" y="374">trend analysis</text>
    <text x="1070" y="396">scenario modeling for</text>
    <text x="1070" y="414">future management</text>
  </g>
  <text x="1070" y="452" font-size="13" fill="#1d6b48" text-anchor="middle" font-weight="700">PERSEUS core today</text>
  <text x="1070" y="476" font-size="12" fill="#5a6b62" text-anchor="middle" font-style="italic">Build-a-run: multi-model,</text>
  <text x="1070" y="494" font-size="12" fill="#5a6b62" text-anchor="middle" font-style="italic">multi-criteria scenarios</text>
  <text x="1070" y="512" font-size="12" fill="#5a6b62" text-anchor="middle" font-style="italic">across markets / policy / climate</text>

  <!-- FOUNDATION -->
  <rect x="300" y="600" width="940" height="70" rx="12" fill="#e7f2eb" stroke="#bcd8c8"/>
  <text x="770" y="632" font-size="16" font-weight="700" fill="#16241d" text-anchor="middle">Values and management goals</text>
  <text x="770" y="654" font-size="12.5" fill="#3a574a" text-anchor="middle">PERSEUS makes this the foundation, not an afterthought: the multi-criteria emphasis weighting (income · carbon · resilience · risk)</text>
  <circle cx="1226" cy="612" r="7" fill="#2e9e6b"/>

  <!-- unifying note -->
  <text x="40" y="612" font-size="12.5" fill="#16241d" font-weight="700">The unifying message</text>
  <text x="40" y="632" font-size="12" fill="#33433b">Maps and modeling are not</text>
  <text x="40" y="650" font-size="12" fill="#33433b">competing — they are adjacent</text>
  <text x="40" y="668" font-size="12" fill="#33433b">boxes of one pipeline.</text>

  <defs><marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 z" fill="#6b7d73"/></marker></defs>
</svg>
