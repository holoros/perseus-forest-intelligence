<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>PERSEUS — Ecoregion Economics &amp; Carbon (cbm_conus)</title>
<link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<style>
  html,body{margin:0;height:100%;background:#0e1419;color:#e6edf3;font-family:system-ui,Segoe UI,Roboto,sans-serif}
  #map{position:absolute;inset:0}
  .panel{position:absolute;top:12px;left:12px;z-index:2;background:#161e26ee;border:1px solid #2a3a47;
    border-radius:10px;padding:12px 14px;max-width:300px;box-shadow:0 4px 18px #0008}
  .panel h1{font-size:15px;margin:0 0 4px}
  .panel p{font-size:11px;color:#9fb0bd;margin:0 0 10px;line-height:1.4}
  .panel label{font-size:11px;color:#9fb0bd;display:block;margin:8px 0 3px}
  select{width:100%;background:#0e1419;color:#e6edf3;border:1px solid #2a3a47;border-radius:6px;padding:5px}
  #legend{margin-top:10px;font-size:11px}
  #legend .row{display:flex;align-items:center;gap:6px;margin:2px 0}
  #legend .sw{width:16px;height:12px;border-radius:2px}
  .tip{position:absolute;z-index:3;background:#0e1419ee;border:1px solid #2a3a47;border-radius:6px;
    padding:6px 8px;font-size:11px;pointer-events:none;display:none;max-width:240px}
  .foot{font-size:10px;color:#6b7c89;margin-top:10px}
</style>
</head>
<body>
<div id="map"></div>
<div class="panel">
  <h1>Ecoregion economics &amp; carbon</h1>
  <p>CONUS multi-model layer (cbm_conus). EPA Level III ecoregions, managed-harvest
     scenario, allocated from state results by EXPNS-exact forest area and weighted
     by forest-type composition.</p>
  <label for="metric">Metric</label>
  <select id="metric">
    <option value="npv_per_ha">NPV per hectare (USD/ha, vs reserve)</option>
    <option value="hwp_carbon">Wood-product carbon stock (tC)</option>
    <option value="net_climate_carbon">Net climate carbon (tC)</option>
    <option value="area_ha">Forest area (ha)</option>
  </select>
  <div id="legend"></div>
  <div class="foot">Source: holoros/cbm_conus · ecoregion_layer.geojson</div>
</div>
<div class="tip" id="tip"></div>
<script>
const GEOJSON = "ecoregion_layer.geojson";   // co-located static asset
const PALETTE = ["#5b1a18","#a6442e","#d98c5f","#f0d9b8","#bcd9c5","#6fae8f","#2f7d63","#15513f"];
const fmt = (v,m)=> v==null?"n/a": m==="npv_per_ha"?("$"+Math.round(v).toLocaleString())
  : (Math.round(v).toLocaleString());

function quantileBreaks(vals, n){
  const v=vals.filter(x=>x!=null&&isFinite(x)).sort((a,b)=>a-b);
  if(!v.length) return [0];
  const qs=[]; for(let i=1;i<n;i++) qs.push(v[Math.floor(i/n*(v.length-1))]);
  return qs;
}
function colorExpr(prop, breaks){
  const e=["step",["coalesce",["get",prop],0],PALETTE[0]];
  breaks.forEach((b,i)=> e.push(b, PALETTE[Math.min(i+1,PALETTE.length-1)]));
  return e;
}
function renderLegend(breaks, metric){
  const el=document.getElementById("legend"); el.innerHTML="";
  const labs=[]; let prev="min";
  breaks.forEach(b=>{ labs.push(prev+" – "+fmt(b,metric)); prev=fmt(b,metric); });
  labs.push(prev+" – max");
  labs.forEach((t,i)=>{ const r=document.createElement("div"); r.className="row";
    r.innerHTML='<span class="sw" style="background:'+PALETTE[Math.min(i,PALETTE.length-1)]+'"></span>'+t;
    el.appendChild(r); });
}

const map=new maplibregl.Map({
  container:"map", center:[-96,38], zoom:3.4,
  style:{version:8,sources:{},layers:[{id:"bg",type:"background",paint:{"background-color":"#0e1419"}}]}
});
map.addControl(new maplibregl.NavigationControl({showCompass:false}),"top-right");

map.on("load", async ()=>{
  const gj=await (await fetch(GEOJSON)).json();
  map.addSource("eco",{type:"geojson",data:gj});
  let metric="npv_per_ha";
  const vals=()=>gj.features.map(f=>f.properties[metric]);
  function apply(){
    const breaks=quantileBreaks(vals(),PALETTE.length);
    map.setPaintProperty("ecofill","fill-color",colorExpr(metric,breaks));
    renderLegend(breaks,metric);
  }
  map.addLayer({id:"ecofill",type:"fill",source:"eco",
    paint:{"fill-color":"#6fae8f","fill-opacity":0.82,"fill-outline-color":"#0e1419"}});
  map.addLayer({id:"ecoline",type:"line",source:"eco",paint:{"line-color":"#0e1419","line-width":0.3}});
  apply();
  document.getElementById("metric").addEventListener("change",e=>{metric=e.target.value;apply();});

  const tip=document.getElementById("tip");
  map.on("mousemove","ecofill",e=>{
    const p=e.features[0].properties; tip.style.display="block";
    tip.style.left=(e.point.x+12)+"px"; tip.style.top=(e.point.y+12)+"px";
    tip.innerHTML="<b>"+(p.NA_L3NAME||p.NA_L3CODE)+"</b><br>"+
      "NPV/ha: "+fmt(p.npv_per_ha,"npv_per_ha")+"<br>"+
      "HWP carbon: "+fmt(p.hwp_carbon)+" tC<br>"+
      "Net climate C: "+fmt(p.net_climate_carbon)+" tC<br>"+
      "Forest area: "+fmt(p.area_ha)+" ha";
  });
  map.on("mouseleave","ecofill",()=>{tip.style.display="none";});
});
</script>
</body>
</html>
