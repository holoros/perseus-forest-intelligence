name: Deploy Forest Intelligence (Pages)

# IMPORTANT: auto-deploy on push is intentionally DISABLED right now because
# the main branch source (v0.73) is behind the deployed gh-pages bundle (v1.3).
# An auto-build from main would publish a regression and erase the AOI upload,
# point inspector, ycx animation, and CSPI v3 features that live only in
# gh-pages today. Reconcile the source first, then change `on:` back to
# `push: branches: [main]` to re-enable continuous deployment.
#
# Until then, this workflow only runs on manual dispatch from the Actions tab.

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
