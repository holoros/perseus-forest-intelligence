name: Deploy Forest Intelligence (Pages)

# Continuous deploy: as of v1.6 (2 June 2026) the main source reproduces
# the deployed gh-pages bundle byte-for-byte (issue #15 reconciliation), so
# an auto-build from main is non-regressive. Every push to main builds and
# deploys to GitHub Pages via the Actions artifact path. Pages Source must
# be set to "GitHub Actions" for the deploy job to publish.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
